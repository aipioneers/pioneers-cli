name: Bug Report
description: Report a bug in pioneers-cli
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `pioneers login`
        2. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or output.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: "OS, Python version, pioneers-cli version"
      placeholder: "macOS 15, Python 3.12, pioneers-cli 0.1.0"
